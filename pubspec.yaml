name: coaching_app
description: Coaching Class Management App
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  go_router: ^13.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  flutter_launcher_icons: ^0.13.1
  pdf: ^3.10.7
  printing: ^5.12.0
  flutter_native_splash: 2.3.7

flutter:
  assets:
    - assets/images/logo.png
  uses-material-design: true
flutter_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
flutter_native_splash:
  color: "#FFFFFF"   # ✅ White background
  android: true
  ios: true

  android_12:
    color: "#FFFFFF"

  # Optional logo (recommended)
  image: assets/images/logo.png 